{# The station-cockpit status bar (roadmap M6): rides every page. Filled by
   /static/statusbar.js from GET /api/status_bar; clocks tick client-side. #}
<div id="cockpit-bar">
  <span class="cb-item cb-clocks">
    <b data-cb="utc">--:--:--</b> UTC
    <span class="cb-sep">·</span> <b data-cb="local">--:--:--</b>
    <span class="cb-sep">·</span> LST <b data-cb="lst">--:--</b>
  </span>
  <span class="cb-item cb-station" data-cb="station">…</span>
  <span class="cb-item cb-source"><span class="cb-dot" data-cb="source-dot"></span><span data-cb="source">…</span></span>
  <span class="cb-item cb-weather" data-cb="weather" hidden></span>
  <span class="cb-item cb-disk" data-cb="disk">…</span>
  <span class="cb-controls">
    <button type="button" class="cb-toggle" id="time-toggle"
            title="switch timestamp display between your local timezone and UTC">Local</button>
    <button type="button" class="cb-toggle" id="theme-toggle"
            title="cycle theme: auto (follow OS) → light → dark">Auto</button>
  </span>
</div>
<script src="/static/statusbar.js" defer></script>
<script src="/static/ui.js" defer></script>
