<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}jansky-observe{% endblock %}</title>
  <script>
    /* Apply the saved theme before first paint (no flash). Dark is the default
       (the CSS :root); only an explicit "light" choice sets the attribute. */
    (function () {
      if (localStorage.getItem("theme") === "light")
        document.documentElement.setAttribute("data-theme", "light");
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body class="content">
  {% include "_cockpit_bar.html" %}
  {% include "_nav.html" %}
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
