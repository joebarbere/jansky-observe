<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}jansky-observe{% endblock %}</title>
  <script>
    /* Apply the saved theme before first paint (no flash). Dark is the default
       (the CSS :root); only an explicit "light" choice sets the attribute. */
    (function () {
      if (localStorage.getItem("theme") === "light")
        document.documentElement.setAttribute("data-theme", "light");
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body class="content">
  {% include "_cockpit_bar.html" %}
  <nav id="topnav">
    <a href="/">Live</a>
    <a href="/sky">Sky</a>
    <a href="/observations">Observations</a>
    <a href="/wizard" class="nav-cta">New session</a>
    <span class="nav-gap"></span>
    <a href="/catalog/sources">Sources</a>
    <a href="/catalog/observers">Observers</a>
    <a href="/catalog/types">Types</a>
    <a href="/catalog/locations">Locations</a>
    <a href="/calibration">Calibration</a>
    <a href="/station">Station</a>
  </nav>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
