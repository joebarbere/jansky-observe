<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jansky-observe — live</title>
  <script>
    /* Apply the saved theme before first paint (no flash). */
    (function () {
      var t = localStorage.getItem("theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-ws-path="{{ ws_path }}">
  {% include "_cockpit_bar.html" %}
  <header id="statusbar">
    <span id="conn" class="badge connecting">connecting&hellip;</span>
    <span class="stat">seq <b id="stat-seq">&ndash;</b></span>
    <span class="stat"><b id="stat-fps">&ndash;</b> fps</span>
    <span class="stat">center <b id="stat-center">&ndash;</b> MHz</span>
    <span class="stat">span <b id="stat-span">&ndash;</b> MHz</span>
    <span class="stat">avg <b id="avg-count">0</b> frames</span>
    <button id="btn-reset-avg" class="btn btn-small" type="button">Reset avg</button>
    <span class="ctl-group">
      <span id="hi-badge" class="badge hi-accum" title="live &quot;am I seeing it?&quot; verdict on the server's accumulating average">HI &ndash;</span>
      <a id="hi-badge-reset" href="#" title="clear the live accumulating average">reset</a>
    </span>
    <span class="ctl-group" id="audio-group" hidden>
      <button id="audio-toggle" class="btn btn-small" type="button" aria-pressed="false"
              title="sonify the live spectrum — client-side WebAudio, no extra Pi load">🔇 Audio</button>
      <select id="audio-mode" class="btn-small" title="sonification mode" disabled>
        <option value="receiver">Receiver</option>
        <option value="doppler">Doppler pitch</option>
        <option value="geiger">Geiger</option>
        <option value="drone">Drone</option>
      </select>
    </span>
    <span id="version">jansky-observe {{ version }}</span>
  </header>
  <section id="capture-panel" class="pane">
    <div id="capture-controls">
      <span class="ctl-group">
        <button id="btn-start-npz" class="btn btn-start" type="button" disabled>Record spectra (.npz)</button>
        <span id="proj-npz" class="proj" title="projected disk usage at current stream parameters">&ndash;</span>
      </span>
      <span class="ctl-group">
        <button id="btn-start-sigmf" class="btn btn-start" type="button" disabled>Record IQ (SigMF)</button>
        <span id="proj-sigmf" class="proj" title="projected disk usage at current stream parameters">&ndash;</span>
      </span>
      <button id="btn-stop" class="btn btn-stop" type="button" disabled>Stop</button>
      <button id="btn-rfi-sweep" class="btn" type="button" disabled title="HackRF pre-session RFI survey &mdash; the live stream pauses for the sweep's duration">RFI sweep</button>
      <span id="capture-state" class="badge unknown">daemon&hellip;</span>
      <span id="overrun-badge" class="badge overrun hidden">OVERRUN &mdash; capture has gaps</span>
    </div>
    <div id="rfi-result" class="hidden"></div>
    <div id="capture-live" class="hidden">
      <span class="stat">file <b id="cap-file">&ndash;</b></span>
      <span class="stat">elapsed <b id="cap-elapsed">&ndash;</b></span>
      <span class="stat"><b id="cap-mb">&ndash;</b> MB</span>
      <span class="stat"><b id="cap-rate">&ndash;</b> MB/s</span>
      <span class="stat">disk <b id="cap-disk">&ndash;</b></span>
    </div>
    <div id="capture-error" class="hidden"></div>
  </section>
  <main>
    <section id="spectrum-wrap" class="pane">
      <canvas id="spectrum"></canvas>
    </section>
    <section id="waterfall-wrap" class="pane">
      <canvas id="waterfall"></canvas>
    </section>
    <div id="overlay">waiting for capture daemon&hellip;</div>
  </main>
  <script src="/static/audio.js"></script>
  <script src="/static/waterfall.js"></script>
</body>
</html>
