name: release

# Every milestone tag (v*) becomes an installable GitHub Release: full checks -> build ->
# a RELEASE-BLOCKING install gate (pristine debian:trixie arm64 container running the real
# install.sh against the just-built wheel) -> only then publish. A tag whose gate fails
# publishes NOTHING — the job ordering guarantees it (plan §9).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  # Same checks as ci.yml, on both architectures — a release must pass everything CI does.
  checks:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout jansky-observe
        uses: actions/checkout@v4
        with:
          path: jansky-observe
      - name: Checkout jansky (the library dependency)
        uses: actions/checkout@v4
        with:
          repository: joebarbere/jansky
          ref: v0.2.0
          path: jansky
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Sync
        working-directory: jansky-observe
        run: uv sync
      - name: Lint
        working-directory: jansky-observe
        run: uv run ruff check src/ tests/
      - name: Format check
        working-directory: jansky-observe
        run: uv run ruff format --check src/ tests/
      - name: Typecheck
        working-directory: jansky-observe
        run: uv run mypy
      - name: Test + coverage floor
        working-directory: jansky-observe
        run: uv run pytest --cov=jansky_observe --cov-report=term-missing
      - name: Deploy drift check (embedded units/udev == deploy/ copies)
        working-directory: jansky-observe
        run: |
          bash deploy/install.sh --print-unit server | diff -u deploy/systemd/jansky-observe.service -
          bash deploy/install.sh --print-unit capture | diff -u deploy/systemd/jansky-observe-capture.service -
          bash deploy/install.sh --print-udev | diff -u deploy/udev/99-jansky-observe-sdr.rules -
      - name: Shell syntax check
        working-directory: jansky-observe
        run: bash -n deploy/install.sh deploy/qemu/run-install-test.sh

  # Build the release artifacts on arm64 — the architecture the Pi installs.
  build:
    needs: checks
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout jansky-observe
        uses: actions/checkout@v4
        with:
          path: jansky-observe
      - name: Checkout jansky (the library dependency)
        uses: actions/checkout@v4
        with:
          repository: joebarbere/jansky
          ref: v0.2.0
          path: jansky
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Build sdist + wheel
        working-directory: jansky-observe
        run: uv build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: jansky-observe/dist/*
          if-no-files-found: error

  # THE RELEASE-BLOCKING GATE (plan §9): a pristine Debian Trixie arm64 container — the
  # same userland family as the pinned Raspberry Pi OS Lite image — runs the real
  # install.sh against the just-built wheel. --smoke makes the installer run both
  # processes in the foreground (no systemd in a container), poll /healthz, and read one
  # binary frame from the live WebSocket. Exit 0 here is what "installable" means.
  install-gate:
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout jansky-observe
        uses: actions/checkout@v4
        with:
          path: jansky-observe
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: jansky-observe/dist
      - name: Run install.sh in a pristine debian:trixie container
        working-directory: jansky-observe
        # No --allow-unsupported-os: debian:trixie on the arm64 runner must pass the
        # installer's own OS check (Debian family, codename trixie, aarch64) — the gate
        # verifies that check too.
        run: |
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/deploy/install.sh:/install.sh:ro" \
            debian:trixie bash -ceu '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends curl ca-certificates sudo
              wheel="$(ls /dist/jansky_observe-*.whl)"
              sudo bash /install.sh --wheel "$wheel" --jansky-ref v0.2.0 --smoke
            '

  # Publishes only if the gate passed (needs: install-gate) and only on a tag push.
  release:
    needs: install-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jansky-observe
        uses: actions/checkout@v4
        with:
          path: jansky-observe
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: jansky-observe/dist
      - name: Stage release assets + SHA256SUMS
        working-directory: jansky-observe
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/* release-assets/
          cp deploy/install.sh release-assets/
          (cd release-assets && sha256sum -- * > SHA256SUMS)
          cat release-assets/SHA256SUMS
      - name: Upload staged assets as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: jansky-observe/release-assets/*
          if-no-files-found: error
      - name: Publish GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: jansky-observe/release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
